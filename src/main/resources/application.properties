spring.application.name=rhea
server.port=${PORT:8080}

# Database -- H2 file-based for now (see README "Database decision").
# Swap to Postgres for a shared/production deploy by overriding these four
# properties via env vars (Railway provisions DATABASE_URL automatically).
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/rhea;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATASOURCE_USERNAME:sa}
spring.datasource.password=${DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Static resources (index.html, logo) must never be cached -- this app is under active
# iteration and stale cached pages have caused confusion during testing.
spring.web.resources.cache.cachecontrol.no-store=true

# AI agent -- Groq (openai/gpt-oss-120b) via the OpenAI-compatible API, per the Callisto
# brand system's AI provider policy. Llama models are decommissioned -- do not use them.
spring.ai.openai.api-key=${GROQ_API_KEY:not-configured}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=openai/gpt-oss-120b

# Tavily live search, used as a tool by the insurance-match agent.
tavily.api-key=${TAVILY_API_KEY:}
tavily.base-url=https://api.tavily.com

# Google OAuth2 (see SecurityConfig / UserService). Get credentials at
# https://console.cloud.google.com/apis/credentials and set GOOGLE_CLIENT_ID /
# GOOGLE_CLIENT_SECRET via env vars -- never commit real values. The placeholder
# defaults let the app boot without crashing when credentials aren't set yet;
# the "Continue with Google" button just won't work until they're provisioned.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:GOOGLE_CLIENT_ID_NOT_SET}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:GOOGLE_CLIENT_SECRET_NOT_SET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Whether /api/** requires login. Defaults to enforced (true) for any real deploy.
# The local demo launch config overrides this to false so the demo runs login-free
# without deleting the auth setup -- flip REQUIRE_AUTH back to true (or unset it)
# once there's a real client and the login flow should be enforced again.
rhea.require-auth=${REQUIRE_AUTH:true}

# Whether creating a patient with an already-used state case number silently expunges
# the old patient (and everything tied to it) instead of failing with a 409. Defaults to
# false (enforced uniqueness) for any real deploy -- the local demo launch config overrides
# this to true since demo data is throwaway and re-submitting the same demo values on every
# click shouldn't be a wall. Never set true on a shared/production deploy.
rhea.demo-reset-duplicates=${DEMO_RESET_DUPLICATES:false}
