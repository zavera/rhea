<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/callisto_high.png">
<title>Sign In -- Rhea</title>
<meta name="robots" content="noindex, follow">
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --navy:       #2d3040;
  --navy-lt:    #3a3f55;
  --primary:    #C9A87C;
  --primary-dk: #A68A5E;
  --primary-lt: #EAD9C0;
  --accent:     #2d7a4f;
  --bg:         #f0f1f5;
  --card:       #ffffff;
  --text:       #1a1a1a;
  --muted:      #666666;
  --border:     #e0e0e0;
  --error:      #b94040;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  color: var(--text);
}
button:focus-visible, a:focus-visible, input:focus-visible {
  outline: 3px solid var(--primary); outline-offset: 2px; border-radius: 3px;
}
.auth-wrap { width: 100%; max-width: 420px; }
.auth-brand {
  display: flex; align-items: center; gap: 12px;
  justify-content: center; margin-bottom: 28px;
}
.auth-brand img { width: 40px; height: 40px; object-fit: cover; border-radius: 9px; }
.auth-brand-text .product {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 20px; font-weight: 300;
  color: var(--primary-dk); letter-spacing: 6px; text-transform: uppercase;
}
.auth-brand-text .tagline {
  font-size: 11px; color: var(--muted);
}
.auth-card {
  background: var(--card);
  border-radius: 14px;
  border: 1px solid var(--border);
  box-shadow: 0 4px 24px rgba(45,48,64,.08);
  padding: 32px 28px 28px;
}
.tabs { display: flex; gap: 4px; margin-bottom: 22px; background: var(--bg); border-radius: 8px; padding: 4px; }
.tab {
  flex: 1; text-align: center; padding: 8px 0; font-size: 13px; font-weight: 700;
  border-radius: 6px; cursor: pointer; color: var(--muted); user-select: none;
}
.tab.active { background: var(--navy); color: #fff; }
.google-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 11px 16px;
  border: 1.5px solid var(--border); border-radius: 8px;
  background: #fff; font-size: 14px; font-weight: 600; color: var(--text);
  text-decoration: none; cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
  margin-bottom: 18px;
}
.google-btn:hover { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(201,168,124,.18); }
.divider {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 18px; color: var(--muted); font-size: 12px;
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 12px; font-weight: 700;
  color: var(--navy); margin-bottom: 5px; letter-spacing: .3px;
}
.field input {
  width: 100%; padding: 10px 12px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 14px; color: var(--text); background: var(--bg);
  font-family: inherit;
}
.field input:focus { border-color: var(--primary); background: #fff; outline: none; }
.submit-btn {
  width: 100%; padding: 12px;
  background: var(--navy); color: #fff;
  border: none; border-radius: 8px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: background .15s; margin-top: 4px;
  font-family: inherit;
}
.submit-btn:hover { background: var(--navy-lt); }
.submit-btn:disabled { opacity: .6; cursor: default; }
.error-box, .success-box {
  display: none; border-radius: 7px; padding: 10px 12px; font-size: 13px; margin-bottom: 14px;
}
.error-box { background: #fef2f2; border: 1px solid #fca5a5; color: var(--error); }
.success-box { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
.auth-footer { text-align: center; margin-top: 6px; }
.auth-footer a { color: var(--navy); font-size: 13px; text-decoration: none; }
.auth-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<main>
  <div class="auth-wrap">
    <div class="auth-brand">
      <img src="/callisto_high.png" alt="Rhea logo">
      <div class="auth-brand-text">
        <div class="product">RHEA</div>
        <div class="tagline">Coverage pairing for unemployed patients, nationwide</div>
      </div>
    </div>

    <div class="auth-card">
      <div class="tabs">
        <div class="tab active" id="tab-signin">Sign In</div>
        <div class="tab" id="tab-signup">Create Account</div>
      </div>

      <a href="/oauth2/authorization/google" class="google-btn">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.9 2.5 30.3 0 24 0 14.6 0 6.6 5.4 2.5 13.3l7.8 6C12.2 13.3 17.6 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.5 2.9-2.2 5.4-4.7 7l7.3 5.7c4.3-4 6.8-9.9 6.8-16.7z"/>
          <path fill="#FBBC05" d="M10.3 28.7A14.9 14.9 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A24 24 0 0 0 0 24c0 3.8.9 7.5 2.5 10.7l7.8-6z"/>
          <path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.6l-7.3-5.7c-2.1 1.4-4.8 2.3-8.2 2.3-6.4 0-11.8-3.8-13.7-9.3l-7.8 6C6.6 42.6 14.6 48 24 48z"/>
        </svg>
        Continue with Google
      </a>

      <div class="divider" id="signin-divider">or sign in with email</div>
      <div class="divider" id="signup-divider" style="display:none">or create an account with email</div>

      <div class="error-box" id="errorBox" role="alert" aria-live="assertive"></div>
      <div class="success-box" id="successBox" role="status" aria-live="polite"></div>

      <form id="signinForm" novalidate>
        <div class="field">
          <label for="signinEmail">Email</label>
          <input type="email" id="signinEmail" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="field">
          <label for="signinPassword">Password</label>
          <input type="password" id="signinPassword" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="submit-btn" id="signinBtn">Sign In</button>
      </form>

      <form id="signupForm" novalidate style="display:none">
        <div class="field">
          <label for="signupName">Name</label>
          <input type="text" id="signupName" placeholder="Jordan Reyes" required autocomplete="name">
        </div>
        <div class="field">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="field">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="At least 8 characters" required autocomplete="new-password">
        </div>
        <button type="submit" class="submit-btn" id="signupBtn">Create Account</button>
      </form>

      <div class="auth-footer" id="signin-footer">
        No account? <a href="#" id="goToSignup">Create one</a>
      </div>
      <div class="auth-footer" id="signup-footer" style="display:none">
        Already have an account? <a href="#" id="goToSignin">Sign in</a>
      </div>
    </div>
  </div>
</main>

<script>
(function () {
  'use strict';

  const tabSignin = document.getElementById('tab-signin');
  const tabSignup = document.getElementById('tab-signup');
  const signinForm = document.getElementById('signinForm');
  const signupForm = document.getElementById('signupForm');
  const signinDivider = document.getElementById('signin-divider');
  const signupDivider = document.getElementById('signup-divider');
  const signinFooter = document.getElementById('signin-footer');
  const signupFooter = document.getElementById('signup-footer');
  const errorBox = document.getElementById('errorBox');
  const successBox = document.getElementById('successBox');

  function clearMessages() {
    errorBox.style.display = 'none';
    successBox.style.display = 'none';
  }

  function showSignin() {
    clearMessages();
    tabSignin.classList.add('active');
    tabSignup.classList.remove('active');
    signinForm.style.display = 'block';
    signupForm.style.display = 'none';
    signinDivider.style.display = 'flex';
    signupDivider.style.display = 'none';
    signinFooter.style.display = 'block';
    signupFooter.style.display = 'none';
  }

  function showSignup() {
    clearMessages();
    tabSignup.classList.add('active');
    tabSignin.classList.remove('active');
    signupForm.style.display = 'block';
    signinForm.style.display = 'none';
    signupDivider.style.display = 'flex';
    signinDivider.style.display = 'none';
    signupFooter.style.display = 'block';
    signinFooter.style.display = 'none';
  }

  tabSignin.addEventListener('click', showSignin);
  tabSignup.addEventListener('click', showSignup);
  document.getElementById('goToSignup').addEventListener('click', e => { e.preventDefault(); showSignup(); });
  document.getElementById('goToSignin').addEventListener('click', e => { e.preventDefault(); showSignin(); });

  const params = new URLSearchParams(window.location.search);
  if (params.has('error')) {
    const type = params.get('error');
    errorBox.textContent = type === 'google'
      ? 'Google sign-in failed. Please try again or use email/password.'
      : 'Sign-in failed. Please check your credentials.';
    errorBox.style.display = 'block';
  }

  signinForm.addEventListener('submit', function (e) {
    e.preventDefault();
    const btn = document.getElementById('signinBtn');
    clearMessages();
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    const body = new URLSearchParams();
    body.append('username', document.getElementById('signinEmail').value.trim());
    body.append('password', document.getElementById('signinPassword').value);

    fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: body.toString()
    })
      .then(r => r.json())
      .then(data => {
        if (data.loggedIn) {
          window.location.href = '/';
        } else {
          throw new Error(data.error || 'Sign-in failed.');
        }
      })
      .catch(ex => {
        errorBox.textContent = ex.message || 'Invalid email or password.';
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      });
  });

  signupForm.addEventListener('submit', function (e) {
    e.preventDefault();
    const btn = document.getElementById('signupBtn');
    clearMessages();
    btn.disabled = true;
    btn.textContent = 'Creating account…';

    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;

    fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    })
      .then(r => r.json().then(data => ({ ok: r.ok, data })))
      .then(({ ok, data }) => {
        if (!ok) throw new Error(data.error || 'Registration failed.');
        successBox.textContent = 'Account created. Signing you in…';
        successBox.style.display = 'block';

        const loginBody = new URLSearchParams();
        loginBody.append('username', email);
        loginBody.append('password', password);
        return fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: loginBody.toString()
        }).then(r => r.json());
      })
      .then(data => {
        if (data.loggedIn) {
          window.location.href = '/';
        } else {
          window.location.href = '/login';
        }
      })
      .catch(ex => {
        errorBox.textContent = ex.message || 'Registration failed.';
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      });
  });
})();
</script>
</body>
</html>
